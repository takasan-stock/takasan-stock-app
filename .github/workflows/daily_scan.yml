name: 日本株スクリーナー 定期スキャン

on:
  schedule:
    # GitHub Actionsのcronは混雑時に数時間ずれることがあるため、
    # 「その日の夜のうちに確実に1回終わらせる」狙いで、市場終了後〜夜22時台まで
    # 複数の時刻を予約する。scan.py側で「当日すでにスキャン済みならスキップ」するため、
    # 実際にスキャンが走るのは1日1回だけ（最初に時間内に起動できたもの）。
    # ・混雑ピークを避けるため、あえて半端な分(:07,:23等)を指定している。
    # ・遅延しても夜のうちに拾えるよう、夜遅めの時刻にも予約を残している。
    - cron: "7 6 * * 1-5"     # UTC  6:07 = JST 15:07（市場終了直後）
    - cron: "23 7 * * 1-5"    # UTC  7:23 = JST 16:23
    - cron: "37 8 * * 1-5"    # UTC  8:37 = JST 17:37
    - cron: "53 9 * * 1-5"    # UTC  9:53 = JST 18:53
    - cron: "11 11 * * 1-5"   # UTC 11:11 = JST 20:11
    - cron: "29 12 * * 1-5"   # UTC 12:29 = JST 21:29
    - cron: "43 13 * * 1-5"   # UTC 13:43 = JST 22:43
  workflow_dispatch:        # 手動実行ボタンも使えるようにする

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90      # GitHub Actionsの上限（無料枠でも十分な余裕）

    steps:
      - name: トリガー種別を表示（定期実行か手動実行かを記録）
        run: |
          echo "トリガー種別: ${{ github.event_name }}"
          echo "実行開始時刻(UTC): $(date -u)"

      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存ライブラリをインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-scan.txt

      - name: 全銘柄スキャン実行
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python scan.py
