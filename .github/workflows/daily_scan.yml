name: 日本株スクリーナー 定期スキャン

on:
  schedule:
    # JST 20:17 = UTC 11:17（市場終了からやや時間を置き、GitHub Actions混雑を避ける）
    # ・毎正時(:00)や:15,:30,:45は混雑しやすいため、あえて:17という半端な分を指定
    # ・18時台は同様のスケジューラーが集中しやすく遅延が大きかったため時間帯もずらした
    - cron: "17 11 * * 1-5"   # UTC 11:17 = JST 20:17、月〜金のみ
  workflow_dispatch:        # 手動実行ボタンも使えるようにする

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90      # GitHub Actionsの上限（無料枠でも十分な余裕）

    steps:
      - name: トリガー種別を表示（定期実行か手動実行かを記録）
        run: |
          echo "トリガー種別: ${{ github.event_name }}"
          echo "実行開始時刻(UTC): $(date -u)"

      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存ライブラリをインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-scan.txt

      - name: 全銘柄スキャン実行
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python scan.py
