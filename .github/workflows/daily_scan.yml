name: 日本株スクリーナー 定期スキャン

on:
  schedule:
    # GitHub Actionsのcronは混雑時に数時間ずれることがあるため、
    # 「市場終了後〜20時まで」に確実に1回走らせる狙いで複数の時刻を予約する。
    # scan.py側で「当日すでにスキャン済みならスキップ」するので二重実行にはならない。
    # （どれか最初に時間内に走ったものだけが実際にスキャンを行う）
    - cron: "40 6 * * 1-5"    # UTC 6:40  = JST 15:40（市場終了直後）
    - cron: "10 8 * * 1-5"    # UTC 8:10  = JST 17:10
    - cron: "40 9 * * 1-5"    # UTC 9:40  = JST 18:40
  workflow_dispatch:        # 手動実行ボタンも使えるようにする

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90      # GitHub Actionsの上限（無料枠でも十分な余裕）

    steps:
      - name: トリガー種別を表示（定期実行か手動実行かを記録）
        run: |
          echo "トリガー種別: ${{ github.event_name }}"
          echo "実行開始時刻(UTC): $(date -u)"

      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存ライブラリをインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-scan.txt

      - name: 全銘柄スキャン実行
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python scan.py
