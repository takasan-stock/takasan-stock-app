name: 日本株スクリーナー 定期スキャン

on:
  schedule:
    # JST 18:00 = UTC 09:00（市場終了後に実行）
    # cron は UTC 基準で書く点に注意
    - cron: "0 9 * * 1-5"   # 月〜金のみ
  workflow_dispatch:        # 手動実行ボタンも使えるようにする

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90      # GitHub Actionsの上限（無料枠でも十分な余裕）

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存ライブラリをインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-scan.txt

      - name: 全銘柄スキャン実行
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python scan.py
